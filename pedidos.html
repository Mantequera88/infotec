                    <h3 class="text-2xl font-bold text-gray-700 border-b pb-2 mb-4">Información de Contacto</h3>
                    
                    <div class="flex items-start">
                        <span class="text-blue-600 mr-3">📍</span>

                            <div class="w-full lg:w-2/3 h-96 rounded-xl overflow-hidden shadow-2xl border-4 border-white">

                    <div class="flex items-start">

                <div class="md:w-2/3">
                    <h3 class="text-2xl font-bold text-gray-700 border-b pb-2 mb-4">Envíanos un Mensaje</h3>
                    <form action="#" method="POST" class="space-y-4">
                        <div>
                            <label for="nombre" class="block text-sm font-medium text-gray-700">Nombre Completo</label>
                            <input type="text" id="nombre" name="nombre" required
                                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                            <input type="email" id="email" name="email" required
                                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        
                        <div>
                            <label for="mensaje" class="block text-sm font-medium text-gray-700">Tu Mensaje</label>
                            <textarea id="mensaje" name="mensaje" rows="4" required
                                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
                        </div>
                        
                        <div class="pt-4">
                            <button type="submit"
                                    class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-md hover:bg-blue-700 transition duration-300 shadow-md">

                            </button>

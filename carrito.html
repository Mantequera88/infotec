<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFOTEC - Mi Carrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-gray-500 p-10 text-center shadow-md">
        <h1 class="text-4xl text-white font-bold">Tu Carrito de Compras</h1>
        <div class="mt-4">
            <a href="tienda.html" class="text-white hover:underline">← Volver a la tienda</a>
        </div>
    </header>

    <section class="py-16 px-6 max-w-4xl mx-auto min-h-screen">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <div class="flex flex-col space-y-4">
                <div class="flex items-center justify-between border-b pb-4">
                    <div class="flex items-center">
                        <img src="714Y4KXLVPL._AC_UF1000,1000_QL80_.png" alt="Teclado" class="w-20 h-20 object-cover rounded">
                        <div class="ml-4">
                            <h3 class="font-bold text-gray-800">Teclado Mecánico RGB</h3>
                            <p class="text-sm text-gray-500">Cantidad: 1</p>
                        </div>
                    </div>
                    <span class="text-xl font-bold text-blue-600">€75.50</span>
                </div>
                
                <div class="pt-6">
                    <div class="flex justify-between text-2xl font-extrabold text-blue-900 mb-8">
                        <span>Total:</span>
                        <span>€75.50</span>
                    </div>
                    <button class="w-full bg-green-600 text-white py-4 rounded-xl text-xl font-bold hover:bg-green-700 transition shadow-lg">
                        Finalizar Compra
                    </button>
                </div>
            </div>
        </div>
    </section>

    <footer style="background-color: dimgray; color: white; text-align: center; padding: 10px; position: fixed; bottom: 0; width: 100%;">
        <p>&copy; INFOTEC</p>
    </footer>
</body>
</html>

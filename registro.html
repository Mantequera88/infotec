<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFOTEC - Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-gray-500 p-6 text-center shadow-md">
        <h1 class="text-3xl text-white font-bold">Únete a INFOTEC</h1>
    </header>

    <section class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-2xl">
            <h2 class="text-2xl font-bold text-blue-900 text-center mb-8">Crear Nueva Cuenta</h2>
            <form action="soporte.html" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre de usuario</label>
                    <input type="text" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <input type="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700 transition">
                        Registrarse
                    </button>
                </div>
            </form>
            <p class="mt-6 text-center text-sm text-gray-500">
                ¿Ya tienes cuenta? <a href="#" class="text-blue-600 hover:underline">Inicia sesión</a>
            </p>
            <div class="mt-4 text-center">
                <a href="soporte.html" class="text-xs text-gray-400">Volver al inicio</a>
            </div>
        </div>
    </section>

    <footer style="background-color: dimgray; color: white; text-align: center; padding: 10px;">
        <p>&copy; INFOTEC</p>
    </footer>
</body>
</html>
